body:
  text: 馬王堆漢墓帛書陰陽脈死候釋文凡三陽天氣殹其病唯折骨列膚一死凡三陰地氣殹死眽殹陰病而亂則不過十日而死三陰臧煉腸而主殺五死唇反人盈則肉先死齦瘠齒長則骨先死面黑目環視衺則氣先死汗出如絲傅而不流則血先死舌掐卷則筋先死五者扁有則不沽矣
